services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run monitor-comunitario db-upgrade
    env_file:
      - .env.supabase
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uv run uvicorn monitor_comunitario.api.main:app
      --host 0.0.0.0
      --port 8000
    env_file:
      - .env.supabase
    ports:
      - "8000:8000"
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run monitor-comunitario worker
    env_file:
      - .env.supabase
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
