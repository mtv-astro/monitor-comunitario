name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy src

      - name: Test
        run: uv run pytest

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monitor_comunitario
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U monitor -d monitor_comunitario"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://monitor:monitor@localhost:5432/monitor_comunitario
        run: |
          uv run monitor-comunitario db-upgrade
          uv run monitor-comunitario db-current

      - name: Run tests with Postgres
        env:
          DATABASE_URL: postgresql+psycopg://monitor:monitor@localhost:5432/monitor_comunitario
        run: uv run pytest
