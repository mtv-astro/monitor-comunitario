services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor_comunitario
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    ports:
      - "5432:5432"
    volumes:
      - monitor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor_comunitario"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uv run uvicorn monitor_comunitario.api.main:app
      --host 0.0.0.0
      --port 8000
    env_file:
      - .env.docker.example
    ports:
      - "8000:8000"
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run monitor-comunitario worker
    env_file:
      - .env.docker.example
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  monitor_postgres_data:
