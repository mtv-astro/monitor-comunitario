services:
  api:
    build: .
    command: uv run uvicorn monitor_comunitario.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./snapshots:/app/snapshots
    depends_on:
      - postgres

  worker:
    build: .
    command: uv run monitor-comunitario worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./snapshots:/app/snapshots
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor_comunitario
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
