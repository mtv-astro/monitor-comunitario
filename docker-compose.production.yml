services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run monitor-comunitario db-upgrade
    env_file:
      - .env.production
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uv run uvicorn monitor_comunitario.api.main:app
      --host 0.0.0.0
      --port 8000
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run monitor-comunitario worker
    env_file:
      - .env.production
    volumes:
      - ./snapshots:/app/snapshots
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
